name: Publish GitHub Packages

# Publishes @a-dev-kit/lombok-typescript to GitHub Packages (npm registry).
# npmjs.org release.yml stays disabled until ADR-17 batch publish.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

env:
  PACKAGE_SCOPE: '@a-dev-kit'
  PACKAGE_NAME: '@a-dev-kit/lombok-typescript'

jobs:
  publish-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Fetch publish scripts from default branch
        run: git fetch origin "${{ github.event.repository.default_branch }}" && git checkout "origin/${{ github.event.repository.default_branch }}" -- scripts/gh-packages-prepare.mjs scripts/gh-packages-publish.mjs
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "PUBLISH_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@a-dev-kit'
      - name: Prepare package for GitHub Packages
        run: node scripts/gh-packages-prepare.mjs "$PUBLISH_VERSION"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Publish to GitHub Packages
        run: node scripts/gh-packages-publish.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_VERSION: ${{ env.PUBLISH_VERSION }}
          PUBLISH_AS_LATEST: 'true'

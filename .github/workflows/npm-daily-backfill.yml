# npm daily backfill: publish next queue version as `preview`, set `latest` to previous slot.
#
# Example: 0.2.0 on npm → publish 0.3.0 as preview, latest=0.2.0.
# Next day → publish 0.4.0 as preview, latest=0.3.0.
#
# Requires: NPM_PUBLISH_ENABLED=true, NPM_BACKFILL_ACTIVE=true, NPM_TOKEN secret.

name: npm daily backfill

on:
  schedule:
    - cron: '0 14 * * *' # 14:00 UTC daily
  workflow_dispatch:
    inputs:
      version:
        description: 'Force preview version to publish (e.g. 0.3.0); empty = next unpublished'
        required: false
        type: string
      retag_only:
        description: 'Only move dist-tags (no publish); use to set latest=0.2.0 before first preview'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish-next:
    if: vars.NPM_PUBLISH_ENABLED == 'true' && vars.NPM_BACKFILL_ACTIVE == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Plan next backfill step
        id: plan
        env:
          BACKFILL_VERSION: ${{ inputs.retag_only && 'retag-only' || inputs.version }}
        run: node scripts/npm-backfill-plan.mjs
      - name: Skip when backfill queue is complete
        if: steps.plan.outputs.skip == 'true'
        run: echo "Backfill queue complete. Set NPM_BACKFILL_ACTIVE=false and restore release.yml tag push."
      - name: Checkout release tag
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
        run: git checkout "tags/${{ steps.plan.outputs.git_tag }}"
      - name: Overlay npm scripts and README templates from main
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- scripts/npm-prepare.mjs scripts/npm-publish.mjs scripts/validate-npm-readme.mjs
          git checkout origin/main -- scripts/npm-backfill-plan.mjs scripts/npm-apply-dist-tags.mjs
          git checkout origin/main -- docs/npm-readme
      - name: Set publish version
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
        run: echo "PUBLISH_VERSION=${{ steps.plan.outputs.publish_version }}" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v6
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
      - uses: actions/setup-node@v6
        if: steps.plan.outputs.skip != 'true'
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Prepare package for npmjs.org
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
        run: node scripts/npm-prepare.mjs "$PUBLISH_VERSION"
      - name: Validate npm README
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
        run: node scripts/validate-npm-readme.mjs "$PUBLISH_VERSION"
      - run: pnpm install --frozen-lockfile
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
      - run: pnpm typecheck
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
      - run: pnpm test
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
      - run: pnpm build
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
      - name: Publish preview version to npmjs.org
        if: steps.plan.outputs.skip != 'true' && steps.plan.outputs.needs_publish == 'true'
        run: node scripts/npm-publish.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_VERSION: ${{ env.PUBLISH_VERSION }}
          NPM_DIST_TAG: preview
      - name: Overlay dist-tag scripts from main
        if: steps.plan.outputs.skip != 'true'
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- scripts/npm-apply-dist-tags.mjs
      - name: Apply latest and preview dist-tags
        if: steps.plan.outputs.skip != 'true'
        run: |
          ARGS="${{ steps.plan.outputs.latest_version }}"
          if [ -n "${{ steps.plan.outputs.preview_version }}" ]; then
            ARGS="$ARGS ${{ steps.plan.outputs.preview_version }}"
          fi
          node scripts/npm-apply-dist-tags.mjs $ARGS
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

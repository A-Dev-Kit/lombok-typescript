# Publishes unscoped lombok-typescript to npmjs.org (manual dispatch during backfill).
#
# Tag push is DISABLED while NPM_BACKFILL_ACTIVE=true — use npm-daily-backfill.yml instead.
#
# After backfill (slots 0.1.0–0.10.0 on npm):
#   1. Set repository variable NPM_BACKFILL_ACTIVE=false
#   2. Restore:
#        on:
#          push:
#            tags: ['v*.*.*']
#          workflow_dispatch: ...
#        jobs.publish.if: vars.NPM_PUBLISH_ENABLED == 'true'
#
# Gated by NPM_PUBLISH_ENABLED=true. Requires NPM_TOKEN (or Trusted Publishing later).

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write # for npm provenance

env:
  NPM_PACKAGE_NAME: lombok-typescript

jobs:
  publish:
    if: vars.NPM_PUBLISH_ENABLED == 'true' && vars.NPM_BACKFILL_ACTIVE != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - name: Overlay npm publish scripts from main
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- scripts/npm-prepare.mjs scripts/npm-publish.mjs scripts/validate-npm-readme.mjs
          git checkout origin/main -- docs/npm-readme
      - name: Set version from tag
        run: |
          TAG="${{ inputs.tag }}"
          echo "PUBLISH_VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Prepare package for npmjs.org
        run: node scripts/npm-prepare.mjs "$PUBLISH_VERSION"
      - name: Validate npm README
        run: node scripts/validate-npm-readme.mjs "$PUBLISH_VERSION"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Publish to npmjs.org
        run: node scripts/npm-publish.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_VERSION: ${{ env.PUBLISH_VERSION }}
          NPM_DIST_TAG: ${{ vars.NPM_DIST_TAG }}

# Release workflow — DISABLED until batch publish day.
#
# See private RELEASE_QUEUE.md: publish only when 10 versions are code-ready.
# Activate by removing the `if: false` gate and adding NPM_TOKEN.

name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  publish:
    if: false # Remove this line to activate the workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

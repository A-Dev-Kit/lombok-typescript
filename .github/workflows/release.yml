# Publishes unscoped lombok-typescript to npmjs.org on tag push.
#
# Gated by repository variable NPM_PUBLISH_ENABLED=true (Settings → Secrets and variables → Actions).
# Requires NPM_TOKEN secret and npm 2FA on the publishing account (ADR-17).

name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write # for npm provenance

env:
  NPM_PACKAGE_NAME: lombok-typescript

jobs:
  publish:
    if: vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Overlay npm publish scripts for legacy tags
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- scripts/npm-prepare.mjs scripts/npm-publish.mjs
      - name: Set version from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            echo "PUBLISH_VERSION=${TAG#v}" >> "$GITHUB_ENV"
          else
            echo "PUBLISH_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          fi
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Prepare package for npmjs.org
        run: node scripts/npm-prepare.mjs "$PUBLISH_VERSION"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Publish to npmjs.org
        run: node scripts/npm-publish.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_VERSION: ${{ env.PUBLISH_VERSION }}
          NPM_DIST_TAG: ${{ vars.NPM_DIST_TAG }}

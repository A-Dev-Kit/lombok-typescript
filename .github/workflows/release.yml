# Publishes unscoped lombok-typescript to npmjs.org on tag push.
#
# Gated by repository variable NPM_PUBLISH_ENABLED=true (Settings → Secrets and variables → Actions).
# Requires NPM_TOKEN secret and npm 2FA on the publishing account (ADR-17).

name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  id-token: write # for npm provenance

env:
  NPM_PACKAGE_NAME: lombok-typescript

jobs:
  publish:
    if: vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "PUBLISH_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Prepare package for npmjs.org
        run: node scripts/npm-prepare.mjs "$PUBLISH_VERSION"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Publish to npmjs.org
        run: node scripts/npm-publish.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_VERSION: ${{ env.PUBLISH_VERSION }}
          NPM_DIST_TAG: ${{ vars.NPM_DIST_TAG }}

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      eslint:
        patterns:
          - 'eslint'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
          - 'globals'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
